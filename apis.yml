aid: national-transportation-safety-board
name: National Transportation Safety Board
description: >-
  The National Transportation Safety Board (NTSB) is an independent federal
  agency responsible for investigating transportation accidents, including those
  involving airplanes, trains, ships, and pipelines. The NTSB promotes safety
  and prevents future accidents by conducting thorough investigations and making
  recommendations to improve safety standards.
